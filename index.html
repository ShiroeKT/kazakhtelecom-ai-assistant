<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ассистент - Казахтелеком</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .logo-text p {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        .reset-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
        }

        .message.user .avatar {
            background: #e2e8f0;
        }

        .bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message.assistant .bubble {
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 5px;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bubble strong {
            font-weight: 600;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .send-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .category-btn {
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .category-btn:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            transform: translateY(-2px);
        }

        .category-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .category-name {
            font-weight: 600;
            color: #1e293b;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option-btn:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .option-number {
            width: 35px;
            height: 35px;
            background: #dbeafe;
            color: #1e40af;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .diagnosis-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 25px;
            margin-top: 15px;
        }

        .diagnosis-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .diagnosis-section {
            margin-bottom: 20px;
        }

        .diagnosis-section h4 {
            color: #1e293b;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .solution-step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .solution-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .new-chat-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 15px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .bubble {
                max-width: 85%;
            }

            .category-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <div class="logo-text">

            <button class="reset-btn" onclick="resetChat()">🔄 Начать заново</button>

        <div class="input-area">
            <div class="input-container">
                <input type="text" class="input-field" id="userInput" placeholder="Опишите вашу проблему..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

        // State
        let messages = [];
        let currentNode = null;
        let currentCategory = null;
        let isProcessing = false;

        // Functions
        function addMessage(role, content, type = null) {
            messages.push({ role, content, type, timestamp: Date.now() });
            renderMessages();
        }

        function renderMessages() {
            const chatArea = document.getElementById('chatArea');
            
            if (messages.length === 0) {
                chatArea.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        <p>Опишите вашу проблему и я помогу её решить</p>
                    </div>
                `;
                return;
            }

            chatArea.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    <div class="avatar">${msg.role === 'assistant' ? '🤖' : '👤'}</div>
                    <div class="bubble">${formatContent(msg.content)}</div>
                </div>
            `).join('');

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatContent(content) {
            return content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const chatArea = document.getElementById('chatArea');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing';
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function analyzeInput(input) {
            const lowerInput = input.toLowerCase();
            const detectedSymptoms = [];
            
            for (const symptom of SYMPTOMS) {
                for (const keyword of symptom.keywords) {
                    if (lowerInput.includes(keyword.toLowerCase())) {
                        if (!detectedSymptoms.find(s => s.id === symptom.id)) {
                            detectedSymptoms.push(symptom);
                        }
                    }
                }
            }

            return detectedSymptoms;
        }

        function suggestCategory(symptoms) {
            if (symptoms.length === 0) return 'internet';
            
            const counts = {};
            symptoms.forEach(s => {
                counts[s.category] = (counts[s.category] || 0) + 1;
            });

            return Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
        }

        function showCategorySelector(suggestedCategory) {
            const chatArea = document.getElementById('chatArea');
            const selectorDiv = document.createElement('div');
            selectorDiv.id = 'categorySelector';
            selectorDiv.innerHTML = `
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        Выберите категорию услуги:
                        <div class="category-grid">
                            ${Object.entries(CATEGORIES).map(([key, cat]) => `
                                <button class="category-btn" onclick="selectCategory('${key}')">
                                    <div class="category-icon">${cat.icon}</div>
                                    <div class="category-name">${cat.name}</div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            chatArea.appendChild(selectorDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showDiagnosticOptions(node) {
            const chatArea = document.getElementById('chatArea');
            const optionsDiv = document.createElement('div');
            optionsDiv.id = 'diagnosticOptions';
            optionsDiv.innerHTML = `
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        ${node.question}
                        <div class="options-list">
                            ${node.answers.map((answer, index) => `
                                <button class="option-btn" onclick="selectAnswer(${index})">
                                    <div class="option-number">${index + 1}</div>
                                    <span>${answer.text}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            chatArea.appendChild(optionsDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showDiagnosis(diagnosis) {
            const chatArea = document.getElementById('chatArea');
            const diagnosisDiv = document.createElement('div');
            diagnosisDiv.id = 'diagnosisCard';
            diagnosisDiv.innerHTML = `
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        <div class="diagnosis-card">
                            <div class="diagnosis-header">✅ Диагностика завершена</div>
                            <div class="diagnosis-section">
                                <h4>${diagnosis.name}</h4>
                                <p>${diagnosis.description}</p>
                            </div>
                            <div class="diagnosis-section">
                                <h4>🔧 Решения:</h4>
                                ${diagnosis.solutions.map(sol => `
                                    <div class="solution-step">
                                        <div class="solution-icon">📝</div>
                                        <div><strong>Шаг ${sol.step}:</strong> ${sol.description}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <button class="new-chat-btn" onclick="resetChat()">Начать новую диагностику</button>
                        </div>
                    </div>
                </div>
            `;
            chatArea.appendChild(diagnosisDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeInteractiveElements() {
            const elements = ['categorySelector', 'diagnosticOptions', 'diagnosisCard'];
            elements.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.remove();
            });
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message || isProcessing) return;

            input.value = '';
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;

            addMessage('user', message);
            removeInteractiveElements();

            showTyping();

            setTimeout(() => {
                hideTyping();
                
                const symptoms = analyzeInput(message);
                
                if (symptoms.length > 0) {
                    const category = suggestCategory(symptoms);
                    addMessage('assistant', `Я обнаружил следующие симптомы: ${symptoms.map(s => s.description).join(', ')}. Выберите категорию для продолжения диагностики.`);
                    showCategorySelector(category);
                } else {
                    addMessage('assistant', 'Пожалуйста, выберите категорию услуги для диагностики:');
                    showCategorySelector('internet');
                }

                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
            }, 1000);
        }

        function selectCategory(category) {
            removeInteractiveElements();
            currentCategory = category;
            
            const tree = DIAGNOSTIC_TREES[category];
            if (tree && tree.length > 0) {
                currentNode = tree[0];
                addMessage('user', CATEGORIES[category].name);
                showDiagnosticOptions(currentNode);
            }
        }

        function selectAnswer(answerIndex) {
            removeInteractiveElements();
            
            const selectedAnswer = currentNode.answers[answerIndex];
            addMessage('user', selectedAnswer.text);

            if (selectedAnswer.nextNodeId) {
                const tree = DIAGNOSTIC_TREES[currentCategory];
                currentNode = tree.find(node => node.id === selectedAnswer.nextNodeId);

                if (currentNode) {
                    if (currentNode.isTerminal) {
                        if (currentNode.diagnosis) {
                            showDiagnosis(currentNode.diagnosis);
                        }
                    } else {
                        showDiagnosticOptions(currentNode);
                    }
                }
            }
        }

        function resetChat() {
            messages = [];
            currentNode = null;
            currentCategory = null;
            removeInteractiveElements();
            renderMessages();
            document.getElementById('userInput').value = '';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Initialize
        renderMessages();
    </script>
</body>
</html>
